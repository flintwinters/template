<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Coding Template</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-labelledby="template-title">
        <p class="eyebrow">Project Template</p>
        <h1 id="template-title">AI coding workspace</h1>
        <p class="summary">
          FastAPI, SQLite, Alembic, TypeScript, and a compact gruvbox interface
          arranged for incremental production work.
        </p>
        <dl class="status-grid">
          <div>
            <dt>Backend</dt>
            <dd id="backend-status">Checking</dd>
          </div>
          <div>
            <dt>Frontend</dt>
            <dd>Compiled TypeScript</dd>
          </div>
          <div>
            <dt>Database</dt>
            <dd>SQLite</dd>
          </div>
        </dl>
      </section>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
