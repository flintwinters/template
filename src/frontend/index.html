<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ project_title }}</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel stack" aria-labelledby="template-title">
        <p class="muted">{{ project_slug }}</p>
        <h1 id="template-title">{{ project_title }}</h1>
        <p>
          FastAPI, SQLite, Alembic, TypeScript, and a compact gruvbox interface
          arranged for incremental production work.
        </p>
        <dl class="grid">
          <div class="surface">
            <dt>Backend</dt>
            <dd id="backend-status">Checking</dd>
          </div>
          <div class="surface">
            <dt>Frontend</dt>
            <dd>Compiled TypeScript</dd>
          </div>
          <div class="surface">
            <dt>Database</dt>
            <dd>SQLite</dd>
          </div>
        </dl>
      </section>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
